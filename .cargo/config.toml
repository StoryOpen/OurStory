# For faster linking, install mold (Linux) and uncomment:
#   sudo dnf install mold   # Fedora
#   sudo apt install mold   # Ubuntu
#   sudo pacman -S mold     # Arch
# Then change linker to "gcc" and add -fuse-ld=mold to rustflags.
#
# macOS (Apple Silicon): install zld:  brew install zld
#   Or install mold:       brew install mold

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/mold"]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

# macOS: uncomment after installing a fast linker:
# [target.aarch64-apple-darwin]
# linker = "/opt/homebrew/bin/zld"
# Or for mold:
# linker = "/opt/homebrew/bin/mold"

[env]
RUST_BACKTRACE = "1"
