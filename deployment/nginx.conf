server {
    listen 80;
    server_name _;

    auth_basic "OurStory";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /home/ubuntu/www;
    index index.html;

    location /wz/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
