<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WZ Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1e1e2e; --surface: #2a2a3e; --border: #3a3a4e;
  --text: #cdd6f4; --text-muted: #6c7086; --text-bright: #ffffff;
  --accent: #89b4fa; --accent-hover: #74c7ec;
  --green: #a6e3a1; --yellow: #f9e2af; --red: #f38ba8;
  --orange: #fab387; --blue: #89b4fa; --pink: #f5c2e7;
  --tree-indent: 20px; --header-h: 40px;
}
html, body { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
body { display: flex; flex-direction: column; }

header {
  height: var(--header-h); display: flex; align-items: center; gap: 12px;
  padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 600; color: var(--text-bright); }
header span { font-size: 12px; }

main { flex: 1; display: flex; overflow: hidden; }

#tree-panel {
  width: 320px; min-width: 200px; resize: horizontal; overflow: hidden;
  border-right: 1px solid var(--border); background: var(--surface);
  display: flex; flex-direction: column;
}
#tree-panel h2 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); padding: 8px 12px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#tree-container { flex: 1; overflow-y: auto; padding: 4px 0; }

.tree-node { user-select: none; }
.tree-row {
  display: flex; align-items: center; gap: 4px; padding: 2px 8px;
  cursor: pointer; border-radius: 4px; margin: 0 4px; height: 26px;
}
.tree-row:hover { background: var(--border); }
.tree-row.selected { background: var(--accent); color: var(--bg); }
.tree-row.selected .node-icon { color: var(--bg); }
.tree-row.selected .node-name { color: var(--bg); }
.tree-row.selected .child-count { color: var(--bg); opacity: 0.6; }

.tree-toggle {
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 10px; color: var(--text-muted);
  transition: transform 0.15s; cursor: pointer;
}
.tree-toggle:hover { color: var(--text); }
.tree-toggle.expanded { transform: rotate(90deg); }
.tree-toggle.leaf { visibility: hidden; pointer-events: none; }

.node-icon { flex-shrink: 0; font-size: 13px; width: 18px; text-align: center; }
.node-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.child-count { font-size: 11px; color: var(--text-muted); opacity: 0.5; flex-shrink: 0; }

.tree-children { display: none; }
.tree-children.open { display: block; }

#detail-panel {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
}

.detail-header { border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.detail-header .node-path { font-size: 11px; color: var(--text-muted); word-break: break-all; margin-top: 2px; }
.detail-header .node-name { font-size: 20px; font-weight: 600; color: var(--text-bright); }
.detail-header .node-type { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.detail-section { display: flex; flex-direction: column; gap: 8px; }
.detail-section h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); font-weight: 600;
}

.value-display {
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px 16px; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  overflow-x: auto; font-size: 13px;
}
.value-int { color: var(--blue); }
.value-float { color: var(--yellow); }
.value-string { color: var(--green); white-space: pre-wrap; word-break: break-word; }
.value-bool-true { color: var(--green); font-weight: 600; }
.value-bool-false { color: var(--red); font-weight: 600; }
.value-null { color: var(--text-muted); font-style: italic; }
.value-vector { color: var(--pink); }

.image-container {
  display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
}
.image-container img {
  max-width: 100%; max-height: 500px; border-radius: 6px;
  border: 1px solid var(--border); object-fit: contain;
  background: repeating-conic-gradient(var(--surface) 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
}
.image-container .image-info { font-size: 12px; color: var(--text-muted); }

.children-list { display: flex; flex-wrap: wrap; gap: 4px; }
.child-tag {
  font-size: 12px; padding: 2px 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
  transition: background 0.1s;
}
.child-tag:hover { background: var(--border); }
.child-tag .tag-icon { margin-right: 4px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); gap: 8px;
}
.empty-state .icon { font-size: 48px; opacity: 0.3; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

.status-error { color: var(--red); }
.status-ok { color: var(--green); }

/* --- Search command palette --- */
.search-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.5); justify-content: center; padding-top: 15vh;
}
.search-overlay.open { display: flex; }
.search-palette {
  width: 640px; max-width: 90vw; max-height: 60vh; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: flex; flex-direction: column; overflow: hidden;
}
.search-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.search-header input {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 16px; font-family: inherit;
}
.search-header input::placeholder { color: var(--text-muted); }
.search-categories {
  display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0;
}
.search-categories::-webkit-scrollbar { height: 3px; }
.search-cat-btn {
  font-size: 12px; padding: 3px 10px; border-radius: 10px; cursor: pointer;
  background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  white-space: nowrap; font-family: inherit; transition: all 0.1s;
}
.search-cat-btn:hover { border-color: var(--accent); color: var(--text); }
.search-cat-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
.search-body {
  flex: 1; overflow-y: auto; min-height: 100px;
}
.search-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100px; color: var(--text-muted); font-size: 13px;
}
.search-results { display: flex; flex-direction: column; }
.search-result {
  display: flex; align-items: center; gap: 10px; padding: 8px 16px;
  cursor: pointer; transition: background 0.1s;
}
.search-result:hover, .search-result.highlighted { background: var(--border); }
.result-thumb {
  width: 48px; height: 48px; flex-shrink: 0; border-radius: 6px;
  background: var(--bg); overflow: hidden; display: flex;
  align-items: center; justify-content: center; font-size: 20px;
}
.result-thumb img { width: 100%; height: 100%; object-fit: contain; }
.result-thumb .fallback { font-size: 18px; opacity: 0.5; }
.result-info { flex: 1; min-width: 0; }
.result-text {
  font-size: 14px; color: var(--text); overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; font-weight: 500;
}
.result-text mark { background: var(--accent); color: var(--bg); border-radius: 2px; padding: 0 2px; }
.result-sub {
  font-size: 11px; color: var(--text-muted); margin-top: 2px;
  display: flex; align-items: center; gap: 8px;
}
.result-wzfile {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: var(--bg); color: var(--text-muted); border: 1px solid var(--border);
}
.result-path { font-size: 11px; color: var(--text-muted); opacity: 0.6; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-spinner {
  display: flex; align-items: center; justify-content: center; height: 80px;
}
</style>
</head>
<body>
<header>
  <h1>WZ Explorer</h1>
  <span id="status" class="status-ok">loading...</span>
<span style="font-size:11px;color:var(--text-muted);margin-left:auto">Ctrl+P search</span>
</header>
<main>
  <div id="tree-panel">
    <h2>Tree</h2>
    <div id="tree-container"></div>
  </div>
  <div id="detail-panel">
    <div class="empty-state">
      <div class="icon">&#128193;</div>
      <div>Select a node to inspect</div>
    </div>
  </div>
</main>

  </div>
</div>

<div id="search-overlay" class="search-overlay">
  <div class="search-palette">
    <div class="search-header">
      <input id="search-input" type="text" placeholder="Search mobs, items, maps, skills..." spellcheck="false">
    </div>
    <div id="search-categories" class="search-categories"></div>
    <div id="search-body" class="search-body">
      <div class="search-empty">Type to search</div>
    </div>
  </div>
</div>

<script>
const API_BASE = '';

const state = {
  root: null,
  selectedPath: null,
  expanded: new Set(),
  cache: {},
};

function encodeWzPath(path) {
  return path.split('/').map(encodeURIComponent).join('/');
}

function apiURL(path, depth) {
  return `${API_BASE}/wz/node/${encodeWzPath(path)}?depth=${depth}`;
}

function imageURL(path) {
  return `${API_BASE}/wz/image/${encodeWzPath(path)}`;
}

async function fetchJSON(path, depth) {
  const url = apiURL(path, depth);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
  return res.json();
}

function getChildArray(node) {
  if (!node || !node.children) return [];
  return Array.isArray(node.children) ? node.children : Object.values(node.children);
}

function getIcon(node) {
  if (node.has_image) return '\uD83D\uDDBC';
  if (node.value !== null && node.value !== undefined) {
    const t = typeof node.value;
    if (t === 'number') return '\uD83D\uDD22';
    if (t === 'string') return '\uD83D\uDCDD';
    if (t === 'boolean') return '\u26A1';
    if (t === 'object') return '\uD83D\uDCCD';
  }
  const c = getChildArray(node);
  return c.length > 0 ? '\uD83D\uDCC1' : '\uD83D\uDCC4';
}

function getLeafIcon(node) {
  if (node.has_image) return '\uD83D\uDDBC';
  if (node.value) return '\uD83D\uDCC4';
  return getChildArray(node).length > 0 ? '\uD83D\uDCC1' : '\uD83D\uDCC4';
}

function updateStatus(text, isError) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = isError ? 'status-error' : 'status-ok';
}

async function loadRoot() {
  try {
    const data = await fetchJSON('', 1);
    state.root = data;
    state.cache[''] = data;
    renderTree();
    updateStatus(Object.keys(state.cache).length + ' nodes cached');
  } catch (e) {
    updateStatus('Error: ' + e.message, true);
    document.getElementById('tree-container').innerHTML =
      `<div style="padding:16px;color:var(--red);font-size:13px">Failed to load WZ data.<br>Make sure the server has WZ files in ./wz/ and Base.wz exists.</div>`;
  }
}

function formatValueHTML(value) {
  if (value === null || value === undefined) return null;
  if (typeof value === 'number') {
    const cls = Number.isInteger(value) ? 'value-int' : 'value-float';
    return { html: `<span class="${cls}">${value}</span>` };
  }
  if (typeof value === 'string') {
    return { html: `<span class="value-string">${esc(value)}</span>` };
  }
  if (typeof value === 'boolean') {
    return { html: value ? `<span class="value-bool-true">true</span>` : `<span class="value-bool-false">false</span>` };
  }
  if (typeof value === 'object') {
    if ('x' in value && 'y' in value) {
      return { html: `<span class="value-vector">{ x: ${value.x}, y: ${value.y} }</span>` };
    }
  }
  return null;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// --- Event delegation for tree ---

document.getElementById('tree-container').addEventListener('click', async (e) => {
  const toggle = e.target.closest('.tree-toggle');
  if (toggle) {
    e.stopPropagation();
    const row = toggle.closest('.tree-row');
    if (row) await toggleExpand(row.dataset.path);
    return;
  }
  const row = e.target.closest('.tree-row');
  if (!row) return;
  const path = row.dataset.path;
  if (!path) return;
  selectNode(path);
});

document.getElementById('tree-container').addEventListener('dblclick', async (e) => {
  const row = e.target.closest('.tree-row');
  if (!row) return;
  const path = row.dataset.path;
  if (!path) return;
  await toggleExpand(path);
  selectNode(path);
});

async function toggleExpand(path) {
  if (state.expanded.has(path)) {
    state.expanded.delete(path);
    renderTree();
    return;
  }

  state.expanded.add(path);
  renderTree();

  if (state.cache[path]) {
    const children = getChildArray(state.cache[path]);
    const uncached = children.filter(c => !state.cache[c.path]);
    if (uncached.length === 0) return;
  }

  try {
    const data = await fetchJSON(path, 1);
    state.cache[path] = data;
    renderTree();
  } catch (e) {
    console.error('Failed to load children:', e);
    state.expanded.delete(path);
    renderTree();
  }
}

async function ensureChildrenCached(path) {
  if (state.cache[path]) return state.cache[path];
  const data = await fetchJSON(path, 1);
  state.cache[path] = data;
  return data;
}

async function selectNode(path) {
  if (state.selectedPath === path) return;
  const oldRow = document.querySelector(`.tree-row.selected`);
  if (oldRow) oldRow.classList.remove('selected');
  const newRow = document.querySelector(`.tree-row[data-path="${CSS.escape(path)}"]`);
  if (newRow) newRow.classList.add('selected');
  state.selectedPath = path;
  await renderDetail(path);
}

async function renderDetail(path) {
  const panel = document.getElementById('detail-panel');

  try {
    await ensureChildrenCached(path);
  } catch (e) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">&#9888;</div><div>Failed to load: ${esc(e.message)}</div></div>`;
    return;
  }

  const node = state.cache[path];
  if (!node) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">&#10067;</div><div>Node not found</div></div>`;
    return;
  }

  const children = getChildArray(node);
  const fmt = formatValueHTML(node.value);

  function valueTypeName(v) {
    if (v === null || v === undefined) return null;
    if (typeof v === 'number') return Number.isInteger(v) ? 'Int' : 'Float';
    if (typeof v === 'string') return 'String';
    if (typeof v === 'boolean') return 'Bool';
    if (typeof v === 'object') return 'Vector2D';
    return null;
  }
  let typeLabel = 'Container';
  if (node.value !== null && node.value !== undefined) {
    typeLabel = valueTypeName(node.value) || 'Unknown';
    if (node.has_image) typeLabel += ' + Image';
  } else if (node.has_image) {
    typeLabel = 'Image';
  } else if (children.length > 0) {
    typeLabel = `Container (${children.length})`;
  } else {
    typeLabel = 'Leaf';
  }

  let html = `
    <div class="detail-header">
      <div class="node-name">${esc(node.name || '(root)')}</div>
      <div class="node-path">${esc(node.path || '')}</div>
      <div class="node-type">${typeLabel}</div>
    </div>
  `;

  if (fmt) {
    html += `
      <div class="detail-section">
        <h3>Value</h3>
        <div class="value-display">${fmt.html}</div>
      </div>
    `;
  }

  if (node.has_image) {
    html += `
      <div class="detail-section">
        <h3>Image</h3>
        <div class="image-container">
          <img src="${esc(imageURL(node.path))}" alt="${esc(node.name)}" onerror="this.after(document.createTextNode('(failed to load)'))">
        </div>
      </div>
    `;
  }

  if (children.length > 0) {
    const tags = children.map(c =>
      `<span class="child-tag" data-path="${esc(c.path)}"><span class="tag-icon">${getLeafIcon(c)}</span>${esc(c.name)}</span>`
    ).join('');
    html += `
      <div class="detail-section">
        <h3>Children (${children.length})</h3>
        <div class="children-list">${tags}</div>
      </div>
    `;
  }

  panel.innerHTML = html;

  panel.querySelectorAll('.child-tag').forEach(el => {
    el.addEventListener('click', () => selectNode(el.dataset.path));
  });
}

function renderTree() {
  const container = document.getElementById('tree-container');
  if (!state.root) {
    container.innerHTML = '<div style="padding:12px;color:var(--text-muted)"><span class="spinner"></span> Loading...</div>';
    return;
  }

  const children = getChildArray(state.root);
  if (children.length === 0) {
    container.innerHTML = '<div style="padding:12px;color:var(--text-muted)">(empty)</div>';
    return;
  }

  container.innerHTML = renderNodeList(children, 0);
}

function renderNodeList(nodes, depth) {
  let html = '';
  for (const node of nodes) {
    const path = node.path;
    const cached = state.cache[path];
    const data = cached || node;
    const children = getChildArray(data);
    const isExpanded = state.expanded.has(path);
    const isSelected = state.selectedPath === path;
    const hasChildren = children.length > 0 || data.has_image;
    const icon = getIcon(data);
    const childCount = children.length;

    html += `<div class="tree-node">`;
    html += `<div class="tree-row${isSelected ? ' selected' : ''}" data-path="${esc(path)}" style="padding-left:${8 + depth * 20}px">`;

    if (hasChildren) {
      html += `<span class="tree-toggle${isExpanded ? ' expanded' : ''}">&#9654;</span>`;
    } else {
      html += `<span class="tree-toggle leaf">&#9654;</span>`;
    }

    html += `<span class="node-icon">${icon}</span>`;
    html += `<span class="node-name">${esc(data.name)}</span>`;

    if (childCount > 0) {
      html += `<span class="child-count">${childCount}</span>`;
    }

    html += `</div>`;

    if (isExpanded) {
      if (children.length > 0) {
        html += `<div class="tree-children open">${renderNodeList(children, depth + 1)}</div>`;
      } else if (cached) {
        html += `<div class="tree-children open"></div>`;
      } else {
        html += `<div class="tree-children open"><div style="padding:4px 0 4px ${8 + (depth + 1) * 20}px;color:var(--text-muted);font-size:12px"><span class="spinner"></span> loading...</div></div>`;
      }
    }

    html += `</div>`;
  }
  return html;
}

// --- Search command palette ---
const searchOverlay = document.getElementById('search-overlay');
const searchInput = document.getElementById('search-input');
const searchCategories = document.getElementById('search-categories');
const searchBody = document.getElementById('search-body');

let searchActiveCategory = 'All';
let searchResults = [];
let searchHighlightIdx = -1;
let searchDebounceTimer = null;

function openSearch() {
  searchOverlay.classList.add('open');
  searchInput.value = '';
  searchActiveCategory = 'All';
  searchResults = [];
  searchHighlightIdx = -1;
  searchBody.innerHTML = '<div class="search-empty">Type to search</div>';
  searchCategories.innerHTML = '';
  setTimeout(() => searchInput.focus(), 50);
}

function closeSearch() {
  searchOverlay.classList.remove('open');
}

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
    e.preventDefault();
    if (searchOverlay.classList.contains('open')) {
      closeSearch();
    } else {
      openSearch();
    }
    return;
  }
  if (!searchOverlay.classList.contains('open')) return;

  if (e.key === 'Escape') {
    closeSearch();
    e.preventDefault();
    return;
  }

  const isComposing = e.isComposing || e.keyCode === 229;
  if (isComposing) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    moveHighlight(1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    moveHighlight(-1);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    acceptHighlight();
  } else if (e.key === 'Tab') {
    e.preventDefault();
    cycleCategory(e.shiftKey ? -1 : 1);
  }
});

function moveHighlight(dir) {
  const items = searchBody.querySelectorAll('.search-result');
  if (items.length === 0) return;
  items.forEach(el => el.classList.remove('highlighted'));
  searchHighlightIdx = Math.max(0, Math.min(items.length - 1, searchHighlightIdx + dir));
  items[searchHighlightIdx].classList.add('highlighted');
  items[searchHighlightIdx].scrollIntoView({ block: 'nearest' });
}

function acceptHighlight() {
  const items = searchBody.querySelectorAll('.search-result');
  if (searchHighlightIdx >= 0 && searchHighlightIdx < items.length) {
    const idx = parseInt(items[searchHighlightIdx].dataset.idx);
    selectSearchResult(searchResults[idx]);
  }
}

function cycleCategory(dir) {
  const btns = searchCategories.querySelectorAll('.search-cat-btn');
  if (btns.length === 0) return;
  let idx = 0;
  btns.forEach((b, i) => { if (b.classList.contains('active')) idx = i; });
  idx = (idx + dir + btns.length) % btns.length;
  btns[idx].click();
}

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(doSearch, 150);
});

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) {
    searchBody.innerHTML = '<div class="search-empty">Type to search</div>';
    searchCategories.innerHTML = '';
    searchResults = [];
    searchHighlightIdx = -1;
    return;
  }
  searchBody.innerHTML = '<div class="search-spinner"><span class="spinner"></span></div>';
  searchHighlightIdx = -1;
  try {
    const params = new URLSearchParams({ q });
    if (searchActiveCategory !== 'All') params.set('category', searchActiveCategory);
    const res = await fetch(`/wz/search?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    searchResults = data.results || [];
    renderSearchCategories(data.categories || ['All']);
    renderSearchResults();
  } catch (e) {
    searchBody.innerHTML = `<div class="search-empty">Error: ${e.message}</div>`;
  }
}

let searchCategoriesList = [];

function renderSearchCategories(categories) {
  searchCategoriesList = categories;
  searchCategories.innerHTML = categories.map(c =>
    `<button class="search-cat-btn ${c === searchActiveCategory ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  searchCategories.querySelectorAll('.search-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      searchActiveCategory = btn.dataset.cat;
      searchCategories.querySelectorAll('.search-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSearchResults();
    });
  });
}

function highlightText(text, query) {
  const terms = query.split(/\s+/).filter(Boolean);
  let result = esc(text);
  for (const term of terms) {
    const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function renderSearchResults() {
  const filtered = searchActiveCategory === 'All'
    ? searchResults
    : searchResults.filter(r => r.category === searchActiveCategory);
  if (filtered.length === 0) {
    searchBody.innerHTML = '<div class="search-empty">No results found</div>';
    return;
  }
  const q = searchInput.value.trim();
  // Build from original searchResults but only render matching items.
  // data-idx stores the original index into searchResults.
  let html = '';
  for (let origIdx = 0; origIdx < searchResults.length; origIdx++) {
    const r = searchResults[origIdx];
    if (searchActiveCategory !== 'All' && r.category !== searchActiveCategory) continue;
    const displayText = r.text.split('\n')[0] || r.name;
    const wzFile = r.wz_file || `${r.category}.wz`;
    html += `<div class="search-result" data-idx="${origIdx}">
      <div class="result-thumb">${r.thumbnail_path
        ? `<img src="/wz/image/${r.thumbnail_path}" alt="" onerror="this.outerHTML='<span class=\\'fallback\\'>${getCategoryIcon(r.category)}</span>'">`
        : `<span class="fallback">${getCategoryIcon(r.category)}</span>`}
      </div>
      <div class="result-info">
        <div class="result-text">${highlightText(displayText, q)}</div>
        <div class="result-sub">
          <span class="result-wzfile">${esc(wzFile)}</span>
          <span class="result-path">${esc(r.path)}</span>
        </div>
      </div>
    </div>`;
  }
  searchBody.innerHTML = html;

  searchBody.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      selectSearchResult(searchResults[idx]);
    });
    el.addEventListener('mouseenter', () => {
      searchBody.querySelectorAll('.search-result').forEach(e => e.classList.remove('highlighted'));
      el.classList.add('highlighted');
      const all = searchBody.querySelectorAll('.search-result');
      all.forEach((e, i) => { if (e === el) searchHighlightIdx = i; });
    });
  });
  searchHighlightIdx = 0;
  const first = searchBody.querySelector('.search-result');
  if (first) first.classList.add('highlighted');
}

function getCategoryIcon(cat) {
  const icons = {
    Mob: '\uD83D\uDC7A', Npc: '\uD83D\uDC76', Map: '\uD83D\uDFE2',
    Skill: '\u2728', Equip: '\uD83D\uDDE1\uFE0F', Consume: '\uD83C\uDF3F',
    Install: '\uD83C\uDFF0', Etc: '\uD83D\uDCE6', Cash: '\uD83D\uDCB0',
    Pet: '\uD83D\uDC3E', Reactor: '\u2699\uFE0F', Quest: '\uD83D\uDCDC',
    Book: '\uD83D\uDCD6', Character: '\uD83D\uDC64', UI: '\uD83D\uDDA5\uFE0F',
    Effect: '\u2728', Morph: '\uD83D\uDCAA', TamingMob: '\uD83D\uDC34',
    Sound: '\uD83D\uDD0A', Special: '\uD83C\uDF1F'
  };
  return icons[cat] || '\uD83D\uDCC1';
}

async function selectSearchResult(entry) {
  closeSearch();
  const rootPrefix = state.root?.path ? state.root.path + '/' : '';
  const fullPath = rootPrefix + entry.path;
  const segments = fullPath.split('/');
  // Walk top-down using tree-formatted paths (e.g. "Base/Mob") as cache
  // keys, matching what renderTree/node.path uses. The root segment
  // ("Base") is already cached as '' from loadRoot, so skip it.
  // If a node doesn't exist in the data tree (e.g. mob without sprites),
  // stop expanding rather than dropping the whole navigation.
  let treePath = '';
  for (const seg of segments) {
    treePath = treePath ? `${treePath}/${seg}` : seg;
    if (treePath === state.root.path) continue;
    if (!state.cache[treePath]) {
      try {
        const data = await fetchJSON(treePath, 1);
        state.cache[treePath] = data;
      } catch {
        break;
      }
    }
    state.expanded.add(treePath);
  }
  renderTree();
  if (state.cache[fullPath]) {
    await selectNode(fullPath);
    const row = document.querySelector(`.tree-row.selected`);
    if (row) row.scrollIntoView({ block: 'nearest' });
  }
}

loadRoot();
</script>
