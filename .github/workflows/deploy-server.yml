name: Deploy Server

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build wz-server (aarch64)
        run: |
          cargo build --release --package wz-server --target aarch64-unknown-linux-gnu
          tar czf wz-server-aarch64-unknown-linux-gnu.tar.gz \
            -C target/aarch64-unknown-linux-gnu/release wz-server

      - name: Upload wz-server asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: wz-server-aarch64-unknown-linux-gnu.tar.gz
          append_body: true

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            TAG="${{ github.ref_name }}"
            REPO="${{ github.repository }}"
            URL="https://github.com/$REPO/releases/download/$TAG/wz-server-aarch64-unknown-linux-gnu.tar.gz"
            echo "Downloading wz-server..."
            curl -sL "$URL" -o /tmp/wz-server.tar.gz
            tar xzf /tmp/wz-server.tar.gz -C /tmp
            sudo mv /tmp/wz-server /home/ubuntu/.cargo/bin/wz-server
            sudo chmod +x /home/ubuntu/.cargo/bin/wz-server
            echo "Restarting wz-server..."
            sudo systemctl restart wz-server
            echo "Done."
