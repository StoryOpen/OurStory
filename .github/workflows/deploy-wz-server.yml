name: Build & Deploy wz-server

on:
  push:
    tags:
      - 'wz-server-v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build wz-server (aarch64)
        run: |
          cargo build --release --package wz-server --target aarch64-unknown-linux-gnu
          tar czf wz-server-aarch64-unknown-linux-gnu.tar.gz \
            -C target/aarch64-unknown-linux-gnu/release wz-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: wz-server v0.1.0 (${{ github.ref_name }})
          files: wz-server-aarch64-unknown-linux-gnu.tar.gz
          make_latest: true
          generate_release_notes: true

      - name: Trigger update on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            TAG="${{ github.ref_name }}"
            ASSET="wz-server-aarch64-unknown-linux-gnu.tar.gz"
            URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$ASSET"
            echo "Downloading $TAG release asset..."
            curl -sL "$URL" -o /tmp/wz-server.tar.gz
            echo "Extracting and installing..."
            tar xzf /tmp/wz-server.tar.gz -C /tmp
            sudo mv /tmp/wz-server /home/ubuntu/.cargo/bin/wz-server
            sudo chmod +x /home/ubuntu/.cargo/bin/wz-server
            echo "Restarting service..."
            sudo systemctl restart wz-server
            echo "Done. Service status:"
            sudo systemctl status wz-server --no-pager
